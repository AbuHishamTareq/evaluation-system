services:
  mysql:
    image: mysql:8.0
    container_name: phc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-phc_eval}
      MYSQL_USER: ${DB_USERNAME:-phc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-phc_pass}
    volumes:
      - phc_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - phc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - phc_redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - phc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: phc-php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-phc_eval}
      - DB_USERNAME=${DB_USERNAME:-phc_user}
      - DB_PASSWORD=${DB_PASSWORD:-phc_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phc-network
    user: "${UID:-1000}:${GID:-1000}"

  nginx:
    image: nginx:alpine
    container_name: phc-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php-fpm:
        condition: service_started
      vite:
        condition: service_started
    networks:
      - phc-network

  vite:
    image: node:20-alpine
    container_name: phc-vite
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    networks:
      - phc-network

networks:
  phc-network:
    driver: bridge

volumes:
  phc_mysql_data:
  phc_redis_data: